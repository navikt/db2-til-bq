apiVersion: nais.io/v1
kind: Naisjob
metadata:
  annotations:
    nais.io/read-only-file-system: "false"
  labels:
    team: utsikt
  name: venteregister-data
  namespace: utsikt
spec:
  schedule: "0 6 * * *" # Runs every hour
  image: "europe-north1-docker.pkg.dev/nais-management-233d/utsikt/venteregister-data:2025.06.27-08.20-d54bc2e"
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
  webproxy: true

  filesFrom:
    - secret: service-account-key
    - secret: db2-license-11
      mountPath: /var/run/secrets/db2-license

  envFrom:
    - secret: oppdrag-q1-credentials

  env:
    # Db2
    - name: DATABASE_HOST
      value: "155.55.1.82"
    - name: DATABASE_PORT
      value: "5025"
    - name: DATABASE_NAME
      value: "QDB2"
    - name: DATABASE_SCHEMA
      value: "OS231Q1"
