apiVersion: nais.io/v1
kind: Naisjob
metadata:
  name: venteregister-data
  namespace: utsikt
  annotations:
    nais.io/read-only-file-system: "false"
spec:
  schedule: "0 6 * * *" # Runs 6 in the morning
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
  webproxy: true
  filesFrom:
    - secret: service-account-key
    - secret: db2-license-11
      mountPath: /var/run/secrets/db2-license
  envFrom:
    - secret: oppdrag-q2-credentials
  gcp:
    permissions:
      - resource:
          apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
          kind: Project
          name: utsikt-dev-3609
        role: roles/bigquery.jobUser
    bigQueryDatasets:
      - name: os231q2_kopi
        permission: READWRITE
